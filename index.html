      function runDynamicCardEngine() {
          try {
              const urlParams = new URLSearchParams(window.location.search);
              const itemId = urlParams.get('id') || urlParams.get('postId'); 
              
              let canonicalUrl = window.location.href;
              if (canonicalUrl.includes('태왕공인중개사사무소.com')) {
                  canonicalUrl = canonicalUrl.replace('태왕공인중개사사무소.com', 'xn--h49a2pelq49bcrfloji4br3e56y.com');
              }
              
              const canonicalEl = document.getElementById('canonicalUrl');
              if (canonicalEl) { canonicalEl.setAttribute('href', canonicalUrl); }
              
              const ogUrlEl = document.getElementById('ogUrl');
              if (ogUrlEl) { ogUrlEl.setAttribute('content', canonicalUrl); }
              
              let actualScreenImg = '';
              try {
                  const selectors = ['.main-preview-img', '#detailMainImg', '#mainImage', '.property-img', '.gallery-top img', 'img[alt="매물 대표 사진"]', 'img[alt="VR 대표 실사 썸네일"]', '#detail-section img', '#vr-starter-thumbnail-mask img'];
                  for (let i = 0; i < selectors.length; i++) {
                      const img = document.querySelector(selectors[i]);
                      if (img && img.src && (img.src.includes('firebasestorage') || img.src.includes('googleapis'))) {
                          actualScreenImg = img.src;
                          break;
                      }
                  }
                  if (!actualScreenImg) {
                      const allImgs = Array.from(document.querySelectorAll('img'));
                      const firebaseImg = allImgs.find(img => {
                          const src = img.src || '';
                          return (src.includes('firebasestorage') || src.includes('googleapis')) && !src.includes('/fonts%2F') && img.offsetWidth > 100 && img.offsetHeight > 100;
                      }) || allImgs.find(img => {
                          const src = img.src || '';
                          return (src.includes('firebasestorage') || src.includes('googleapis')) && !src.includes('/fonts%2F');
                      });
                      if (firebaseImg && firebaseImg.src) { actualScreenImg = firebaseImg.src; }
                  }
                  if (!actualScreenImg) {
                      const targetImg = document.querySelector('.main-preview-img') || document.querySelector('#detailMainImg') || document.querySelector('#mainImage') || document.querySelector('.property-img') || document.querySelector('.gallery-top img') || document.querySelector('img[alt="매물 대표 사진"]') || document.querySelector('img[alt="VR 대표 실사 썸네일"]') || document.querySelector('#detail-section img') || document.querySelector('#vr-starter-thumbnail-mask img') || document.querySelector('img[src*="/images/"]');
                      if (targetImg && targetImg.src) { actualScreenImg = targetImg.src; }
                  }
                  if (actualScreenImg && actualScreenImg.startsWith('/')) { actualScreenImg = window.location.origin + actualScreenImg; }
              } catch (imgErr) { console.error('Firebase storage sensor error:', imgErr); }

              if (itemId) {
                  const dong = document.getElementById('selectedDong')?.value || "구미"; 
                  const building = document.getElementById('buildingName')?.value || "추천 매물";
                  const type = document.querySelector('.btn-item.active')?.innerText || "매물";
                  const newTitle = `태왕공인중개사사무소 - [${dong} ${building} ${type}]`;
                  const newDesc = `실제 발로 뛴 생생한 현장 인프라와 360도 VR 화면을 다이렉트로 확인하세요.`;
                  
                  const ogTitleEl = document.getElementById('ogTitle');
                  if (ogTitleEl) { ogTitleEl.setAttribute('content', newTitle); }
                  const ogDescEl = document.getElementById('ogDesc');
                  if (ogDescEl) { ogDescEl.setAttribute('content', newDesc); }
                  const itemImage = actualScreenImg || `https://www.xn--h49a2pelq49bcrfloji4br3e56y.com/images/default_thumb.jpg`;
                  const ogImageEl = document.getElementById('ogImage');
                  if (ogImageEl) { ogImageEl.setAttribute('content', itemImage); }
              } else {
                  const itemImage = actualScreenImg || 'https://www.xn--h49a2pelq49bcrfloji4br3e56y.com/images/default_thumb.jpg';
                  const ogImageEl = document.getElementById('ogImage');
                  if (ogImageEl) { ogImageEl.setAttribute('content', itemImage); }
              }
          } catch (e) { console.error('Dynamic card engine error:', e); }
      }
      try { runDynamicCardEngine(); } catch (err) {}
      window.addEventListener('DOMContentLoaded', function() {
          runDynamicCardEngine();
          const currentUrl = window.location.href;
          if (currentUrl.includes('id=')) {
              document.getElementById('ogUrl')?.setAttribute('content', currentUrl);
              document.getElementById('canonicalUrl')?.setAttribute('href', currentUrl);

                  document.getElementById('ogImage')?.setAttribute('content', realImg);
              }
          }

      });
    </script>

          alert('요청이 접수되었습니다. 담당자가 곧 연락드리겠습니다.');

      /* [모바일 상단 아이콘 터치 토글 및 하부 패널 제어] */
      function toggleMobilePanel(panelId) {
          if (window.innerWidth > 1024) return;
          const panels = document.querySelectorAll('.mobile-sub-panel');
          panels.forEach(p => {
              if (p.id === panelId) {
                  p.classList.toggle('active');
              } else {
                  p.classList.remove('active');
              }
          });
      }

      /* [핀셋 보호 영역 폰트/스타일 래핑 엔진] */
      function wrapSelectionWithStyle(styleName, styleValue) {
          const sel = window.getSelection();
          if (!sel.rangeCount) return;
          const range = sel.getRangeAt(0);
          
          if (!range.collapsed) {
              const span = document.createElement('span');
              span.style[styleName] = styleValue;
              
              try {
                  range.surroundContents(span);
              } catch (e) {
                  const frag = range.extractContents();
                  span.appendChild(frag);
                  range.insertNode(span);
              }
              
              sel.removeAllRanges();
              const newRange = document.createRange();
              newRange.selectNodeContents(span);
              sel.addRange(newRange);
          }
      }

      /* [선택 영역 폰트 정보 실시간 역추적 동기화] */
      document.addEventListener('selectionchange', function() {
          const sel = window.getSelection();
          if (sel.rangeCount > 0) {
              let node = sel.focusNode;
              if (node && node.nodeType === 3) node = node.parentNode;
              
              if (node) {
                  const computedStyle = window.getComputedStyle(node);
                  const fontFamily = computedStyle.fontFamily;
                  const fontSelect = document.getElementById('fb-font-family-mobile');
                  if (fontSelect && fontFamily) {
                      if (fontFamily.includes('NanumGothic')) fontSelect.value = 'NanumGothic';
                      else if (fontFamily.includes('MaruBuri')) fontSelect.value = 'MaruBuri';
                      else if (fontFamily.includes('NanumBarunGothic')) fontSelect.value = 'NanumBarunGothic';
                      else if (fontFamily.includes('NanumMyeongjo')) fontSelect.value = 'NanumMyeongjo';
                      else if (fontFamily.includes('NanumSquare')) fontSelect.value = 'NanumSquare';
                  }
              }
          }
      });
    </script>

                <div class="modal-form-group"><label>상세 주소 및 호수</label><input type="text" id="modal-req-address" placeholder="송정대로 6길18, 301호" /></div>
                <div class="modal-form-group"><label>요청사항</label><textarea id="modal-req-details" placeholder="이사 예정일, 희망 가격, 기타 문의사항 등 남겨주세요."></textarea></div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn-submit" onclick="submitRequestModal()">제출하기</button>
                <button class="modal-btn-close" onclick="closeRequestModal()">닫기 X</button>
            </div>
        </div>
    </div>

    <!-- ==================== [모바일 하부 팝업 패널 시스템] ==================== -->
    <div id="panel-favorite" class="mobile-sub-panel">
        <h3 class="text-sm font-bold text-slate-800 mb-2">즐겨찾기 템플릿</h3>
        <div class="flex flex-col gap-2">
            <button onclick="injectFavoriteItem('template', 'exterior')" class="w-full text-left px-3 py-2 bg-slate-50 hover:bg-slate-100 rounded border border-slate-200 text-sm">원룸 건물 외관 사진 템플릿</button>
            <button onclick="injectFavoriteItem('template', 'water-pressure')" class="w-full text-left px-3 py-2 bg-slate-50 hover:bg-slate-100 rounded border border-slate-200 text-sm">특별 수압 테스트 통과 세대</button>
            <button onclick="injectFavoriteItem('template', 'sunlight')" class="w-full text-left px-3 py-2 bg-slate-50 hover:bg-slate-100 rounded border border-slate-200 text-sm">정남향 눈부신 채광 실사</button>
        </div>
    </div>

    <div id="panel-image" class="mobile-sub-panel">
        <h3 class="text-sm font-bold text-slate-800 mb-2">이미지 첨부</h3>
        <button onclick="triggerPhotoUpload()" class="w-full py-3 bg-[#0B2545] hover:bg-[#113866] text-white font-bold rounded-lg shadow-sm mb-3">네이비 사진 파일 선택 버튼</button>
        <div class="grid grid-cols-3 gap-2">
            <button onclick="injectFavoriteItem('image', 'kitchen')" class="p-2 bg-slate-50 border border-slate-200 rounded text-xs text-center">내부 주방</button>
            <button onclick="injectFavoriteItem('image', 'bathroom')" class="p-2 bg-slate-50 border border-slate-200 rounded text-xs text-center">실사 화장실</button>
            <button onclick="injectFavoriteItem('image', 'bedroom')" class="p-2 bg-slate-50 border border-slate-200 rounded text-xs text-center">방 침실</button>
        </div>
    </div>

    <div id="panel-sticker" class="mobile-sub-panel">
        <h3 class="text-sm font-bold text-slate-800 mb-2">스티커 (쥐돌이)</h3>
        <div class="grid grid-cols-4 gap-2">
            <button onclick="document.execCommand('insertText', false, '(쥐)')" class="p-2 text-xl hover:bg-slate-100 rounded">(쥐)</button>
            <button onclick="document.execCommand('insertText', false, '(햄스터)')" class="p-2 text-xl hover:bg-slate-100 rounded">(햄스터)</button>
            <button onclick="document.execCommand('insertText', false, '(치즈)')" class="p-2 text-xl hover:bg-slate-100 rounded">(치즈)</button>
            <button onclick="document.execCommand('insertText', false, '(생쥐)')" class="p-2 text-xl hover:bg-slate-100 rounded">(생쥐)</button>
        </div>
    </div>

    <div id="panel-quote" class="mobile-sub-panel">
        <h3 class="text-sm font-bold text-slate-800 mb-2">인용구 및 ↔ 구분선</h3>
        <div class="flex flex-col gap-3">
            <div>
                <span class="text-xs text-slate-500 mb-1 block">에디토리얼 인용 블록 4종</span>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="injectFavoriteItem('quote', 'type1')" class="p-2 bg-slate-50 border border-slate-200 rounded text-xs">타입 1</button>
                    <button onclick="injectFavoriteItem('quote', 'type2')" class="p-2 bg-slate-50 border border-slate-200 rounded text-xs">타입 2</button>
                    <button onclick="injectFavoriteItem('quote', 'type3')" class="p-2 bg-slate-50 border border-slate-200 rounded text-xs">타입 3</button>
                    <button onclick="injectFavoriteItem('quote', 'type4')" class="p-2 bg-slate-50 border border-slate-200 rounded text-xs">타입 4</button>
                </div>
            </div>
            <div>
                <span class="text-xs text-slate-500 mb-1 block">구분선 4종</span>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="insertAutoCalculatedDivider('solid')" class="p-2 bg-slate-50 border border-slate-200 rounded text-xs">실선</button>
                    <button onclick="insertAutoCalculatedDivider('dashed')" class="p-2 bg-slate-50 border border-slate-200 rounded text-xs">점선</button>
                    <button onclick="insertAutoCalculatedDivider('dotted')" class="p-2 bg-slate-50 border border-slate-200 rounded text-xs">도트선</button>
                    <button onclick="insertAutoCalculatedDivider('double')" class="p-2 bg-slate-50 border border-slate-200 rounded text-xs">이중선</button>
                </div>
            </div>
        </div>
    </div>

    <div id="panel-dice" class="mobile-sub-panel">
        <h3 class="text-sm font-bold text-slate-800 mb-2">주사위 마스터 전산 장부</h3>
        <button onclick="alert('무한 조합 주사위 가동!')" class="w-full py-3 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-lg shadow-sm mb-2">무한 조합 주사위 가동!</button>
        <div class="p-3 bg-slate-50 border border-slate-200 rounded text-xs text-slate-600">
            전산 장부 연동 데이터 레이아웃 탑재 완료.
        </div>
    </div>

  </body>
</html>
