    <!-- Global Script Error Shield -->
    <script type="text/javascript">
      (function() {
        var muteHandler = function(e) {
          if (!e) return;
          var msg = e.message || '';
          if (msg.indexOf('Script error') > -1 || msg === 'Script error.' || !e.filename) {
            try {
              e.stopImmediatePropagation();
              e.preventDefault();
            } catch(err) {}
            return true;
          }
        };
        window.addEventListener('error', muteHandler, true);
        window.addEventListener('unhandledrejection', function(e) {
          var reason = e.reason;
          if (!reason || (reason.message && reason.message.indexOf('Script error') > -1)) {
            try {
              e.stopImmediatePropagation();
              e.preventDefault();
            } catch(err) {}
          }
        }, true);
        window.onerror = function(message, source, lineno, colno, error) {
          if (message === 'Script error.' || !source) {
            return true;
          }
        };
      })();
    </script>
