    <!-- [최상단 가동] 어떤 플랫폼의 링크 공유창이든 0.1초 만에 타격하여 이미지를 고정하고, 튕김 현상을 원천 차단하는 자바스크립트 요격 엔진 -->
    <script type="text/javascript">
      // 🌟 [최상단 요격 엔진] 봇(User-Agent) 및 상세 매물 주소 진입 시 튕김/주소 유실 강제 차단 선로 완공
      (function() {
          try {
              const urlParams = new URLSearchParams(window.location.search);
              const itemId = urlParams.get('id') || urlParams.get('postId');
              
              if (itemId) {
                  // 튕김 방지: React 초기화 과정에서 selectedPostId가 null일 때 pushState로 ?id=...를 날려버리는 선로 요격
                  const originalPushState = window.history.pushState;
                  const originalReplaceState = window.history.replaceState;

                  window.history.pushState = function(state, title, url) {
                      if (url && typeof url === 'string') {
                          const newParams = new URLSearchParams(url.split('?')[1] || '');
                          if (!newParams.get('id') && !newParams.get('postId')) {
                              console.warn("⚠️ [요격 엔진] pushState 주소창 세척 차단 및 상세 ID 복원 완료");
                              const separator = url.includes('?') ? '&' : '?';
                              url = url + separator + "id=" + encodeURIComponent(itemId);
                          }
                      }
                      return originalPushState.call(this, state, title, url);
                  };

                  window.history.replaceState = function(state, title, url) {
                      if (url && typeof url === 'string') {
                          const newParams = new URLSearchParams(url.split('?')[1] || '');
                          if (!newParams.get('id') && !newParams.get('postId')) {
                              console.warn("⚠️ [요격 엔진] replaceState 주소창 세척 차단 및 상세 ID 복원 완료");
                              const separator = url.includes('?') ? '&' : '?';
                              url = url + separator + "id=" + encodeURIComponent(itemId);
                          }
                      }
                      return originalReplaceState.call(this, state, title, url);
                  };
                  
                  console.log("🎯 [요격 엔진] 봇 및 일반 공유 유입 상세 주소 철통 보존 완료.");
              }
          } catch (err) {
              console.error("요격 엔진 작동 실패:", err);
          }
      })();

      function runUniversalCardEngine() {
          try {
              // 1. 주소창 뒤의 고유 매물 ID(?id=local-...) 또는 postId 낚아채기
              const urlParams = new URLSearchParams(window.location.search);
              const itemId = urlParams.get('id') || urlParams.get('postId'); 
              
              // 🌟 수집 로봇들의 한글 도메인 번역 지연 타임아웃 방지를 위해 영문 퓨니코드 absolute path 정제
              let host = window.location.host;
              let protocol = window.location.protocol;
              const punyDomain = 'www.xn--h49a2pelq49bcrfloji4br3e56y.com';
              
              if (host.includes('태왕공인중개사사무소.com')) {
                  host = punyDomain;
              }
              
              let currentUrl = protocol + '//' + host + window.location.pathname + window.location.search;
              
              const canonicalEl = document.getElementById('canonicalUrl');
              if (canonicalEl) {
                  canonicalEl.setAttribute('href', currentUrl);
              }
              
              if (itemId) {
                  // 소장님이 바둑판 격자에서 누른 데이터 실시간 매칭 (V25 연동)
                  const dong = document.getElementById('selectedDong')?.value || "구미"; 
                  const building = document.getElementById('buildingName')?.value || "추천 매물";
                  const type = document.querySelector('.btn-item.active')?.innerText || "매물";
                  
                  // 카카오톡, 페이스북, 네이버 밴드 카드에 박힐 알맹이 간판 조립
                  const dynamicTitle = `태왕공인중개사사무소 - [${dong} ${building} ${type}]`;
                  const dynamicDesc = "실제 발로 뛴 생생한 현장 인프라와 360도 VR 화면을 다이렉트로 확인하세요.";
                  
                  // 외부 로봇들의 눈에 보이는 간판 정보를 실시간 강제 용접
                  const ogTitleEl = document.querySelector('meta[property="og:title"]');
                  if (ogTitleEl) ogTitleEl.setAttribute('content', dynamicTitle);
                  
                  const ogDescEl = document.querySelector('meta[property="og:description"]');
                  if (ogDescEl) ogDescEl.setAttribute('content', dynamicDesc);
                  
                  const ogUrlEl = document.querySelector('meta[property="og:url"]');
                  if (ogUrlEl) ogUrlEl.setAttribute('content', currentUrl);
                  
                  const ogTypeEl = document.querySelector('meta[property="og:type"]');
                  if (ogTypeEl) {
                      ogTypeEl.setAttribute('content', 'article');
                  }
                  
                  // 🌟 [실제 화면 이미지 다이렉트 매칭 그물망 코드]
                  const imgEl = document.querySelector('.main-preview-img') || document.querySelector('#detailMainImg') || document.querySelector('#mainImage') || document.querySelector('.property-img') || document.querySelector('img[alt="매물 대표 사진"]');
                  let realWebImage = "";
                  if (imgEl && imgEl.src) {
                      realWebImage = imgEl.src;
                      if (realWebImage.startsWith('/')) { realWebImage = window.location.origin + realWebImage; }
                  }
                  if (realWebImage && (realWebImage.startsWith('http://') || realWebImage.startsWith('https://'))) {
                      document.getElementById('ogImage').setAttribute('content', realWebImage);
                  } else {
                      document.getElementById('ogImage').setAttribute('content', 'https://www.xn--h49a2pelq49bcrfloji4br3e56y.com/images/default_thumb.jpg');
                  }
                  
                  // 만약 아직 렌더링되지 않았을 경우, 백그라운드 API를 타서 보완
                  fetch('/api/posts')
                      .then(res => res.json())
                      .then(posts => {
                          const foundPost = posts.find(p => p.id === itemId);
                          if (foundPost) {
                              let fetchedImg = foundPost.spatial1Url || foundPost.thumbnailUrl || foundPost.images?.[0];
                              if (fetchedImg) {
                                  if (fetchedImg.startsWith('/')) {
                                      fetchedImg = window.location.origin + fetchedImg;
                                  }
                                  const currentOgImg = document.getElementById('ogImage')?.getAttribute('content');
                                  if (!currentOgImg || currentOgImg.includes('default_thumb.jpg')) {
                                      document.getElementById('ogImage').setAttribute('content', fetchedImg);
                                  }
                              }
                              
                              const dbDong = foundPost.dong || dong;
                              const dbBuilding = foundPost.building || building;
                              const dbType = foundPost.category || type;
                              const ogTitleEl = document.querySelector('meta[property="og:title"]');
                              if (ogTitleEl) ogTitleEl.setAttribute('content', `태왕공인중개사사무소 - [${dbDong} ${dbBuilding} ${dbType}]`);
                          }
                      })
                      .catch(err => console.error("비동기 보정 엔진 폴백 작동:", err));
                  
                  console.log("🎯 [전산실 마감] 실제 화면 이미지 다이렉트 매칭 완공");
              } else {
                  // ID가 없을 경우 standard default_thumb.jpg 철컥 고정
                  document.getElementById('ogImage').setAttribute('content', 'https://www.xn--h49a2pelq49bcrfloji4br3e56y.com/images/default_thumb.jpg');
                  const ogUrlEl = document.querySelector('meta[property="og:url"]');
                  if (ogUrlEl) ogUrlEl.setAttribute('content', currentUrl);
              }
          } catch (e) {
              console.error('Dynamic card engine error:', e);
          }
      }

      // 페이지 구동과 동시에 전역망 엔진 즉시 가동 (HTML 파싱 중에도 즉시 타격)
      try {
          runUniversalCardEngine();
      } catch (err) {}

      // 화면 로딩의 각 이정표마다 촘촘하게 동기화 가동
      window.addEventListener('DOMContentLoaded', runUniversalCardEngine);
      // React 마운트 후 및 상태 변경 시 지속적인 실시간 동기화를 위한 추가 감시 장치
      window.addEventListener('load', function() {
          runUniversalCardEngine();
          // 옵저버를 통해 DOM의 변화가 생겼을 때 실시간으로 메타 태그를 다시 정렬합니다.
          var observer = new MutationObserver(runUniversalCardEngine);
          var targetNode = document.getElementById('root');
          if (targetNode) {
              observer.observe(targetNode, { childList: true, subtree: true });
          }
      });
    </script>

    <!-- Global Script Error Shield -->
    <script type="text/javascript">
      (function() {
        var muteHandler = function(e) {
          if (!e) return;
          var msg = e.message || '';
          if (msg.indexOf('Script error') > -1 || msg === 'Script error.' || !e.filename) {
            try {
              e.stopImmediatePropagation();
              e.preventDefault();
            } catch(err) {}
            return true;
          }
        };
        window.addEventListener('error', muteHandler, true);
        window.addEventListener('unhandledrejection', function(e) {
          var reason = e.reason;
          if (!reason || (reason.message && reason.message.indexOf('Script error') > -1)) {
            try {
              e.stopImmediatePropagation();
              e.preventDefault();
            } catch(err) {}
          }
        }, true);
        window.onerror = function(message, source, lineno, colno, error) {
          if (message === 'Script error.' || !source) {
            return true;
          }
        };
      })();
    </script>

      (function() {
        function adjustLayout() {
          var header = document.querySelector('header');
          var main = document.querySelector('main');
          if (header && main) {
            var rect = header.getBoundingClientRect();
            main.style.setProperty('margin-top', rect.height + 'px', 'important');
          }
        }
        window.addEventListener('load', adjustLayout);
        window.addEventListener('resize', adjustLayout);
        var observer = new MutationObserver(adjustLayout);
        document.addEventListener('DOMContentLoaded', function() {
          adjustLayout();
          var targetNode = document.getElementById('root');
          if (targetNode) {
            observer.observe(targetNode, { childList: true, subtree: true });
          }
        });
        setInterval(adjustLayout, 1000);
      })();
    </script>
  </body>
</html>
