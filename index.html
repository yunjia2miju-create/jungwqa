      function runDynamicCardEngine() {
          try {
              const urlParams = new URLSearchParams(window.location.search);
              const itemId = urlParams.get('id') || urlParams.get('postId'); 
              
              let canonicalUrl = window.location.href;
              if (canonicalUrl.includes('태왕공인중개사사무소.com')) {
                  canonicalUrl = canonicalUrl.replace('태왕공인중개사사무소.com', 'xn--h49a2pelq49bcrfloji4br3e56y.com');
              }
              
              const canonicalEl = document.getElementById('canonicalUrl');
              if (canonicalEl) { canonicalEl.setAttribute('href', canonicalUrl); }
              
              const ogUrlEl = document.getElementById('ogUrl');
              if (ogUrlEl) { ogUrlEl.setAttribute('content', canonicalUrl); }
              
              let actualScreenImg = '';
              try {
                  const selectors = ['.main-preview-img', '#detailMainImg', '#mainImage', '.property-img', '.gallery-top img', 'img[alt="매물 대표 사진"]', 'img[alt="VR 대표 실사 썸네일"]', '#detail-section img', '#vr-starter-thumbnail-mask img'];
                  for (let i = 0; i < selectors.length; i++) {
                      const img = document.querySelector(selectors[i]);
                      if (img && img.src && (img.src.includes('firebasestorage') || img.src.includes('googleapis'))) {
                          actualScreenImg = img.src;
                          break;
                      }
                  }
                  if (!actualScreenImg) {
                      const allImgs = Array.from(document.querySelectorAll('img'));
                      const firebaseImg = allImgs.find(img => {
                          const src = img.src || '';
                          return (src.includes('firebasestorage') || src.includes('googleapis')) && !src.includes('/fonts%2F') && img.offsetWidth > 100 && img.offsetHeight > 100;
                      }) || allImgs.find(img => {
                          const src = img.src || '';
                          return (src.includes('firebasestorage') || src.includes('googleapis')) && !src.includes('/fonts%2F');
                      });
                      if (firebaseImg && firebaseImg.src) { actualScreenImg = firebaseImg.src; }
                  }
                  if (!actualScreenImg) {
                      const targetImg = document.querySelector('.main-preview-img') || document.querySelector('#detailMainImg') || document.querySelector('#mainImage') || document.querySelector('.property-img') || document.querySelector('.gallery-top img') || document.querySelector('img[alt="매물 대표 사진"]') || document.querySelector('img[alt="VR 대표 실사 썸네일"]') || document.querySelector('#detail-section img') || document.querySelector('#vr-starter-thumbnail-mask img') || document.querySelector('img[src*="/images/"]');
                      if (targetImg && targetImg.src) { actualScreenImg = targetImg.src; }
                  }
                  if (actualScreenImg && actualScreenImg.startsWith('/')) { actualScreenImg = window.location.origin + actualScreenImg; }
              } catch (imgErr) { console.error('Firebase storage sensor error:', imgErr); }
 
              if (itemId) {
                  const dong = document.getElementById('selectedDong')?.value || "구미"; 
                  const building = document.getElementById('buildingName')?.value || "추천 매물";
                  const type = document.querySelector('.btn-item.active')?.innerText || "매물";
                  const newTitle = `태왕공인중개사사무소 - [${dong} ${building} ${type}]`;
                  const newDesc = `실제 발로 뛴 생생한 현장 인프라와 360도 VR 화면을 다이렉트로 확인하세요.`;
                  
                  const ogTitleEl = document.getElementById('ogTitle');
                  if (ogTitleEl) { ogTitleEl.setAttribute('content', newTitle); }
                  const ogDescEl = document.getElementById('ogDesc');
                  if (ogDescEl) { ogDescEl.setAttribute('content', newDesc); }
                  const itemImage = actualScreenImg || `https://www.xn--h49a2pelq49bcrfloji4br3e56y.com/images/default_thumb.jpg`;
                  const ogImageEl = document.getElementById('ogImage');
                  if (ogImageEl) { ogImageEl.setAttribute('content', itemImage); }
              } else {
                  const itemImage = actualScreenImg || 'https://www.xn--h49a2pelq49bcrfloji4br3e56y.com/images/default_thumb.jpg';
                  const ogImageEl = document.getElementById('ogImage');
                  if (ogImageEl) { ogImageEl.setAttribute('content', itemImage); }
              }
          } catch (e) { console.error('Dynamic card engine error:', e); }
      }
      try { runDynamicCardEngine(); } catch (err) {}
      window.addEventListener('DOMContentLoaded', function() {
          runDynamicCardEngine();
          const currentUrl = window.location.href;

    <script type="text/javascript">
      /* [자바스크립트 드래그 범위 연산 및 툴바 정렬 제어 엔진] */
      document.addEventListener('DOMContentLoaded', function() {
          const editorArea = document.getElementById('root');
          const toolbar = document.getElementById('editor-floating-toolbar');
          let selectionTimeout = null;
          
          if (editorArea && toolbar) {
              // 마우스 드래그 및 키보드 입력 시 선택 영역 감지 리스너
              document.addEventListener('mouseup', handleTextSelection);
              document.addEventListener('keyup', handleTextSelection);
              // 모바일 터치 및 실시간 드래그 범위 변화 센서 추가 결합
              document.addEventListener('touchend', handleTextSelection);
              document.addEventListener('selectionchange', handleTextSelection);
              // 화면 스크롤 시에도 툴바가 가려지거나 사라지지 않고 위치를 실시간 자석 추적하도록 이벤트 결합
              window.addEventListener('scroll', handleTextSelection, { passive: true });
          }
 
          function handleTextSelection() {
              const selection = window.getSelection();
              if (!selection || selection.rangeCount === 0 || selection.isCollapsed) {
                  if (selectionTimeout) clearTimeout(selectionTimeout);
                  selectionTimeout = setTimeout(() => {
                      const currentSelection = window.getSelection();
                      if (!currentSelection || currentSelection.rangeCount === 0 || currentSelection.isCollapsed) {
                          toolbar.style.setProperty('display', 'none', 'important');
                      }
                  }, 200);
                  return;
              }
 
              // 새로운 유효 선택 발생 시 딜레이 타이머 취소
              if (selectionTimeout) {
                  clearTimeout(selectionTimeout);
                  selectionTimeout = null;
              }
              
              const range = selection.getRangeAt(0);
              // 드래그된 텍스트가 실제 에디터 편집창 내부인지 보안 센서 검증
              const commonAncestor = range.commonAncestorContainer;
              const editableParent = commonAncestor.nodeType === Node.ELEMENT_NODE 
                  ? commonAncestor.closest('.note-editable, [contenteditable="true"]') 
                  : (commonAncestor.parentElement ? commonAncestor.parentElement.closest('.note-editable, [contenteditable="true"]') : null);
              
              if (!editableParent) {
                  if (selectionTimeout) clearTimeout(selectionTimeout);
                  selectionTimeout = setTimeout(() => {
                      const currentSelection = window.getSelection();
                      if (!currentSelection || currentSelection.isCollapsed) {
                          toolbar.style.setProperty('display', 'none', 'important');
                      }
                  }, 200);
                  return;
              }
 
              // 드래그 글자의 물리적 위치 좌표 연산
              const rect = range.getBoundingClientRect();
              if (rect.width === 0 || rect.height === 0) {
                  if (selectionTimeout) clearTimeout(selectionTimeout);
                  selectionTimeout = setTimeout(() => {
                      const currentSelection = window.getSelection();
                      if (!currentSelection || currentSelection.isCollapsed) {
                          toolbar.style.setProperty('display', 'none', 'important');
                      }
                  }, 200);
                  return;
              }
 
              // 스마트폰 기기 기본 순정 시스템 가림막을 무조건 이기도록 z-index를 절대 강도 최고 레벨로 주입하고 display 상태를 flex로 강제 용접
              toolbar.style.setProperty('z-index', '2147483647', 'important');
              toolbar.style.setProperty('display', 'flex', 'important');
              
              // 글자를 가리지 않도록 중앙 상단에 칼날 정착 계산 (fixed 기준이므로 scrollX, scrollY 배제)
              const toolbarWidth = toolbar.offsetWidth;
              const toolbarHeight = toolbar.offsetHeight;
              
              const leftPos = rect.left + (rect.width / 2) - (toolbarWidth / 2);
              const topPos = rect.top - toolbarHeight - 12;
 
              // 모바일 환경에서 툴바가 가상 스크린 경계선 밖으로 탈출하거나 찌그러지지 않도록 안전 바운더리 보호 한계 좌표 세부 조율
              const finalLeft = Math.max(10, Math.min(leftPos, window.innerWidth - toolbarWidth - 10));
              const finalTop = Math.max(10, topPos); // 화면 상단 고정벽을 완전히 뚫고 딱 붙어있게 처리
 
              toolbar.style.left = finalLeft + 'px';
              toolbar.style.top = finalTop + 'px';
          }
 
          // 에디터 외부의 빈 공간을 누르면 플로팅 툴바 즉시 소멸
          const handleOutsideInteraction = function(e) {
              if (toolbar && !toolbar.contains(e.target)) {
                  // 컴포넌트 클릭 동작 확보를 위해 미세 시간 지연 후 숨김
                  setTimeout(() => {
                      const sel = window.getSelection();
                      if(!sel || sel.isCollapsed) {
                          toolbar.style.setProperty('display', 'none', 'important');
                      }
                  }, 200);
              }
          };
 
          document.addEventListener('mousedown', handleOutsideInteraction);
          document.addEventListener('touchstart', handleOutsideInteraction);
      });
 
      /* 플로팅 툴바 전용 명령어 브릿지 회로 */
      function applyFloatingStyle(command, value = null) {
          document.execCommand(command, false, value);
      }
 
      /* 🎯 대표님이 명하신 9대 커스텀 글자 크기 강제 인라인 치환 엔진 */
      function applyFloatingSize(pxValue) {
          // 브라우저 기본 execCommand('fontSize')의 1~7 제한을 돌파하여 모든 다중 블록(P 태그 등)을 완벽히 포괄하는 span 강제 치환 엔진
          const selection = window.getSelection();
          if (!selection || selection.isCollapsed) return;
          
          // 시스템 내장 폰트 사이즈 7로 임시 각인
          document.execCommand('fontSize', false, '7');
          
          // 임시 각인된 font 태그들을 전수 추적하여 정확한 px 수치를 담은 span 태그로 완전 교체 매립
          const fontTags = document.querySelectorAll('font[size="7"]');
          fontTags.forEach(font => {
              const span = document.createElement('span');
              span.style.fontSize = pxValue + 'px';
              span.style.lineHeight = '1.6';
              span.innerHTML = font.innerHTML;
              font.parentNode.replaceChild(span, font);
          });
      }
 
      /* 우측 단축 날개 클릭 시 기존 좌측 고정 사이드바의 자바스크립트 함수를 다이렉트로 호출하는 선로 */
      function triggerSidebarAction(actionType) {
          // 현재 드래그된 커서 위치를 보존한 채 메인 React 앱 액션 커맨드로 패스
          var event = new CustomEvent('triggerSidebarComponent', { detail: { type: actionType } });
          window.dispatchEvent(event);
      }
 
      /* [기존 상세페이지 제어 로직 보존 선로] */
      (function() {
        function adjustLayout() {
          var header = document.querySelector('header');
          var main = document.querySelector('main');
          if (header && main) {
            var rect = header.getBoundingClientRect();
            main.style.setProperty('margin-top', rect.height + 'px', 'important');
          }
          controlMobileBottomBar();
        }
 
        function controlMobileBottomBar() {
          const urlParams = new URLSearchParams(window.location.search);
          const itemId = urlParams.get('id');
          const bottomBar = document.getElementById('mobile-bottom-bar') || document.getElementById('mobile-floating-bar');
          if (window.innerWidth <= 768 && itemId) {
              if (bottomBar) { bottomBar.style.setProperty('display', 'flex', 'important'); }
              document.body.style.setProperty('padding-bottom', '65px', 'important');
          } else {
              if (bottomBar) { bottomBar.style.setProperty('display', 'none', 'important'); }
              document.body.style.setProperty('padding-bottom', '0px', 'important');
          }
        }
        window.addEventListener('load', adjustLayout);
        window.addEventListener('resize', adjustLayout);
        var observer = new MutationObserver(adjustLayout);
        document.addEventListener('DOMContentLoaded', function() {
          adjustLayout();
          var targetNode = document.getElementById('root');
          if (targetNode) { observer.observe(targetNode, { childList: true, subtree: true }); }
        });
        setInterval(adjustLayout, 1000);
      })();
 
      function openRequestModal() {
          var modal = document.getElementById('request-modal');
          if (modal) { modal.style.setProperty('display', 'flex', 'important'); }
      }
      function closeRequestModal() {
          var modal = document.getElementById('request-modal');
          if (modal) { modal.style.setProperty('display', 'none', 'important'); }
      }
    </script>
    <div id="mobile-bottom-bar"></div>
 
    <div id="request-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✍️ 매물 내놓기 / 문의 의뢰</h2>
                <button class="modal-close-btn" onclick="closeRequestModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-form-group"><label>의뢰인 성함</label><input type="text" id="modal-req-name" placeholder="홍길동" /></div>
                <div class="modal-form-group"><label>연락처</label><input type="tel" id="modal-req-phone" placeholder="010-1234-5678" /></div>
                <div class="modal-form-group">
                    <label>매물 종류</label>
                    <select id="modal-req-type">
                        <option value="원룸">원룸</option>
                        <option value="투룸">투룸 (미투/쓰리룸)</option>
                        <option value="오피스텔/아파트">오피스텔 / 아파트</option>
                        <option value="상가/사무실">상가 / 사무실</option>
                        <option value="기타">기타 매물</option>
                    </select>
                </div>
                <div class="modal-form-group"><label>상세 주소 및 호수</label><input type="text" id="modal-req-address" placeholder="송정대로 6길18, 301호" /></div>
                <div class="modal-form-group"><label>요청사항</label><textarea id="modal-req-details" placeholder="이사 예정일, 희망 가격, 기타 문의사항 등 남겨주세요."></textarea></div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn-submit" onclick="submitRequestModal()">제출하기</button>
                <button class="modal-btn-close" onclick="closeRequestModal()">닫기 X</button>
            </div>
        </div>
    </div>
  </body>
</html>
