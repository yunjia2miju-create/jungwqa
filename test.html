<!DOCTYPE html>
<html>
<body>
  <div contenteditable="true" id="editor">
    This is a <b>test</b> string.
  </div>
  <script>
    function test() {
        const editor = document.getElementById('editor');
        const sel = window.getSelection();
        const range = document.createRange();
        range.setStart(editor.childNodes[0], 5);
        range.setEnd(editor.childNodes[1].childNodes[0], 2);
        sel.removeAllRanges();
        sel.addRange(range);
        
        document.execCommand('styleWithCSS', false, true);
        document.execCommand('fontName', false, 'MaruBuri');
        
        console.log(editor.innerHTML);
    }
    setTimeout(test, 100);
  </script>
</body>
</html>
