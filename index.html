    <!-- Global Script Error Shield -->
    <script type="text/javascript">
      (function() {
        var muteHandler = function(e) {
          if (!e) return;
          var msg = e.message || '';
          if (msg.indexOf('Script error') > -1 || msg === 'Script error.' || !e.filename) {
            try {
              e.stopImmediatePropagation();
              e.preventDefault();
            } catch(err) {}
            return true;
          }
        };
        window.addEventListener('error', muteHandler, true);
        window.addEventListener('unhandledrejection', function(e) {
          var reason = e.reason;
          if (!reason || (reason.message && reason.message.indexOf('Script error') > -1)) {
            try {
              e.stopImmediatePropagation();
              e.preventDefault();
            } catch(err) {}
          }
        }, true);
        window.onerror = function(message, source, lineno, colno, error) {
          if (message === 'Script error.' || !source) {
            return true;
          }
        };
      })();
    </script>

    <script type="text/javascript">
      // 카카오톡, 네이버, 문자 로봇이 주소(?id=local-...)를 긁어갈 때 실시간 변환하는 엔진
      function runDynamicCardEngine() {
          // 1. 주소창 뒤의 고유 매물 ID(?id=local-1782481745054)를 추출합니다.
          const urlParams = new URLSearchParams(window.location.search);
          const itemId = urlParams.get('id') || urlParams.get('postId'); 
          
          if (itemId) {
              // 2. 현재 입력창이나 장부에 기록된 뼈대 데이터(법정동, 건물명, 매물종류 등)를 수집합니다.
              const dong = document.getElementById('selectedDong')?.value || "구미"; 
              const building = document.getElementById('buildingName')?.value || "추천 매물";
              const type = document.querySelector('.btn-item.active')?.innerText || "매물";
              
              // 🌟 유튜브처럼 실시간으로 알맹이 정보 카드 레이아웃 용접
              const newTitle = `태왕공인중개사사무소 - [${dong} ${building} ${type}]`;
              const newDesc = `실제 발로 뛴 생생한 현장 인프라와 360도 VR 화면을 다이렉트로 확인하세요.`;
              
              // 3. 외부 로봇들 눈에 보이는 간판 태그를 즉시 교체합니다.
              document.getElementById('ogTitle').setAttribute('content', newTitle);
              document.getElementById('ogDesc').setAttribute('content', newDesc);
              document.getElementById('ogUrl').setAttribute('content', window.location.href);
          }
      }

      // 화면 로딩과 동시에 엔진 즉시 가동
      window.addEventListener('DOMContentLoaded', runDynamicCardEngine);
      // React 마운트 후 및 상태 변경 시 지속적인 실시간 동기화를 위한 추가 감시 장치
      window.addEventListener('load', function() {
          runDynamicCardEngine();
          // 옵저버를 통해 DOM의 변화가 생겼을 때 실시간으로 메타 태그를 다시 정렬합니다.
          var observer = new MutationObserver(runDynamicCardEngine);
          var targetNode = document.getElementById('root');
          if (targetNode) {
              observer.observe(targetNode, { childList: true, subtree: true });
          }
      });
    </script>

  <body class="text-slate-800 antialiased min-h-screen flex flex-col w-full overflow-hidden bg-[#F0F0F0]" style="overflow: hidden;">

    <script type="text/javascript">
      (function() {
        function adjustLayout() {
          var header = document.querySelector('header');
          var main = document.querySelector('main');
          if (header && main) {
            var rect = header.getBoundingClientRect();
            main.style.setProperty('margin-top', rect.height + 'px', 'important');
          }
        }
        window.addEventListener('load', adjustLayout);
        window.addEventListener('resize', adjustLayout);
        var observer = new MutationObserver(adjustLayout);
        document.addEventListener('DOMContentLoaded', function() {
          adjustLayout();
          var targetNode = document.getElementById('root');
          if (targetNode) {
            observer.observe(targetNode, { childList: true, subtree: true });
          }
        });
        setInterval(adjustLayout, 1000);
      })();
    </script>
